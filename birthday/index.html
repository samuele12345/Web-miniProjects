<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale= 1.0">
        <title>Birthday</title>
        <link href="styles.css" rel="stylesheet">
        <script src="script.js" defer></script>
    </head>

    <body>
        <header>
            <h1>Birthday</h1>
        </header>
        <main>
            <div id="bir-div">
                <h1 id="tit1">Get your day of birth!</h1>
                <h1 id="tit2">Day</h1>
                <div id="lab-inp">
                    <label id="day-lab" class="lab">Day:</label>
                    <input type="text" min="1" max="31" class="inp" maxlength="4" required>
                    <label id="mon-lab" class="lab">Month:</label>
                    <input type="text" min="1" max="12" class="inp" maxlength="4" required>
                    <label id="y-lab" class="lab">Year:</label>
                    <input type="text" min="1900" max="2026" id="inpY" class="inp" maxlength="4" required>
                </div>
                <button id="but">Submit</button>
            </div>
        </main>
        <footer>
            <h3>Created By Samuele Riva</h3>
        </footer>
    </body>
</html>
