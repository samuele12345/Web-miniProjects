<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="styles.css" rel="stylesheet">
        <title>Random Pas Generator</title>
        <script src="script.js" defer></script>
    </head>

    <body>
        <!-- Header principale della pagina -->
        <header id="header" class="footer-header">
            <h1>Password Generator</h1>
        </header>

        <!-- Area centrale con risultato e pulsante di generazione -->
        <main id="main-index">
            <div id="pw-div">
                <div id="titles">
                    <h1 id="tit1">Get</h1>
                    <h2 id="tit2">Your password</h2>
                </div>
                <p class="par-result">Result...</p>
                <div id="button-div">
                    <button class="buttons" id="butGen">Generate</button>
                </div>
            </div>
        </main>

        <!-- Footer informativo -->
        <footer id="footer" class="footer-header">
            <h3>Let's start to generate!</h3>
        </footer>
    </body>
</html>
