<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock - Paper - Scissors</title>
        <link href="styles.css" rel="stylesheet">
        <script src="script.js" defer></script>
    </head>

    <body>
        <h1 id="title">Rock-Paper-Scissors:</h1>

        <div id="options">
            <button class="but" onclick="playerCompChoice('rock')">Rock</button>
            <button class="but" onclick="playerCompChoice('paper')">Paper</button>
            <button class="but" onclick="playerCompChoice('scissors')">Scissors</button>
        </div>

        <div id="choices">
            <h2>Player chioce:</h2>
            <h2 id="tit-pl" class="pl-holder">Let's</h2>
            <h2>Computer chioce:</h2>
            <h2 id="tit-comp" class="pl-holder">play</h2>
            <h1 id="tit-res" class="pl-holder">NOW!</h1>
            <h3 id="balance">Balance: 0</h3>
        </div>
    </body>
</html>
