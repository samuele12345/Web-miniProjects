<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="styles.css" rel="stylesheet">
        <title>Random Number</title>
        <script src="script.js" defer></script>
    </head>

    <body>
        <!-- Card per generare un numero casuale compreso tra minimo e massimo -->
        <div id="main-div">
            <div id="gener-div">
                <h1>Premi il bottone</h1>
                <h2>per generare un numero casuale</h2>
                <h2>tra minimo e massimo</h2>
                <h1 id="numero">num</h1>
                <!-- Input dei due estremi dell'intervallo -->
                <div id="div-min-max">
                    <input id="min" type="text" placeholder="minimo">
                    <input id="max" type="text" placeholder="massimo">
                </div>
                <button id="bottone">Genera</button>
            </div>
        </div>
    </body>

</html>
